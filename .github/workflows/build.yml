name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

env:
  REGISTRY: docker.io
  IMAGE_NAME_SERVER: zhangthexiaoning/cc-remote-server
  IMAGE_NAME_AGENT: zhangthexiaoning/cc-remote-agent

permissions:
  contents: write

jobs:
  # PR 轻量验证：不启动 Docker，只验证 install + build
  validate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter cc-remote-shared build

      - name: Build agent
        run: pnpm --filter cc-remote-agent build

  # 构建 Docker 镜像（仅 tag 触发，多架构构建并推送）
  build-server:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_SERVER }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # 构建 Agent 独立包
  build-agent:
    runs-on: ubuntu-latest
    needs: build-server
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter cc-remote-shared build

      - name: Build agent
        run: pnpm --filter cc-remote-agent build

      - name: Package agent standalone (tar.gz)
        run: |
          mkdir -p release
          tar -czvf release/cc-agent-${{ github.ref_name }}-standalone.tar.gz \
            -C packages/agent dist node_modules package.json

      - name: Package agent standalone (npm-installable .tgz)
        run: bash scripts/pack-agent-standalone-tgz.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cc-agent-${{ github.ref_name }}
          path: release/

  # 发布 Agent 到 npm (仅 tag 时)
  publish-npm:
    runs-on: ubuntu-latest
    needs: build-agent
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.15.0

      - name: Install dependencies
        run: pnpm install

      - name: Build shared and agent
        run: pnpm run build:agent

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish to npm
        run: |
          pnpm --filter cc-remote-shared publish --access public --no-git-checks
          pnpm --filter cc-remote-agent publish --access public --no-git-checks

  # 创建 GitHub Release (仅在打tag时)
  create-release:
    runs-on: ubuntu-latest
    needs: build-agent
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download agent artifact
        uses: actions/download-artifact@v4
        with:
          name: cc-agent-${{ github.ref_name }}
          path: release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
